<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Dashboard - AIimburse</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="text-lg font-bold gradient-text">AIimburse</span>
        </div>
        <div class="space-y-1 mb-6">
            <p class="text-xs font-semibold uppercase tracking-wider px-3 mb-3" style="color: var(--text-muted);">Main</p>
            <a href="dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="director.html" class="sidebar-link active">Director View</a>
            <a href="finance.html" class="sidebar-link">Finance Review</a>
            <a href="manager.html" class="sidebar-link">Approvals</a>
            <a href="employee.html" class="sidebar-link">My Expenses</a>
            <a href="admin.html" class="sidebar-link">Admin Panel</a>
        </div>
        <div class="space-y-1">
            <a href="#" class="sidebar-link" onclick="toggleTheme(); return false;">Toggle Theme</a>
            <a href="index.html" class="sidebar-link">Logout</a>
        </div>
    </nav>

    <button id="mobile-menu-btn" class="fixed top-4 left-4 z-50 p-2 rounded-xl bg-white/5 border border-white/10 backdrop-blur-xl lg:hidden" onclick="toggleSidebar()">
        <svg class="w-6 h-6" style="color: var(--text-primary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <main class="main-content">
        <div class="topbar">
            <div>
                <h1 class="text-2xl font-bold" style="color: var(--text-primary);">Director Overview</h1>
                <p class="text-sm mt-1" style="color: var(--text-secondary);">Company-wide visibility and final override controls.</p>
            </div>
        </div>

        <div id="director-expenses-list" class="space-y-4"></div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
